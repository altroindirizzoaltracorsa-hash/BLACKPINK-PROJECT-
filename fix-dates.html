<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stream Date Fix · BLINKS Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d0d0d;color:#f0eaf2;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:16px;line-height:1.5;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 64px;
}
.card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:14px;width:100%;max-width:440px;overflow:hidden}
.card-header{background:#ff1a6e;padding:20px 24px}
.card-header h1{font-size:1.1rem;font-weight:700;letter-spacing:.03em;color:#fff}
.card-header p{font-size:.8rem;color:rgba(255,255,255,.75);margin-top:2px}
.card-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.field label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:6px}
.field input{
  width:100%;background:#0d0d0d;border:1px solid #2e2e2e;border-radius:8px;
  padding:12px 14px;color:#f0eaf2;font-size:1rem;font-family:inherit;outline:none;transition:border-color .15s;
}
.field input:focus{border-color:#ff1a6e}
#preview{background:#0d0d0d;border:1px solid #2e2e2e;border-radius:10px;padding:14px;display:none}
#preview h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:10px}
.track-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2e2e2e;font-size:.9rem;gap:8px}
.track-row:last-child{border-bottom:none}
.track-name{font-weight:600;min-width:110px}
.track-detail{text-align:right}
.track-detail .streams{color:#f0eaf2;font-size:.85rem}
.track-detail .action{display:inline-block;margin-top:2px;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.04em}
.action-rename{background:rgba(255,26,110,.15);color:#ff1a6e}
.action-add{background:rgba(62,207,142,.15);color:#3ecf8e}
.action-none{background:rgba(136,136,136,.15);color:#888}
#fix-btn{
  width:100%;background:#ff1a6e;color:#fff;border:none;border-radius:10px;
  padding:15px;font-size:1rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:background .15s,opacity .15s;display:none;
}
#fix-btn:hover:not(:disabled){background:#cc1558}
#fix-btn:disabled{opacity:.5;cursor:not-allowed}
#log{display:flex;flex-direction:column;gap:6px}
.log-line{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;padding:8px 12px;background:#0d0d0d;border-radius:8px;border-left:3px solid transparent}
.log-line.info{border-color:#888;color:#888}
.log-line.ok{border-color:#3ecf8e}
.log-line.err{border-color:#ff5a5a;color:#ff5a5a}
.log-line.warn{border-color:#f5c518;color:#f5c518}
.icon{flex-shrink:0;width:16px;text-align:center}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#ff1a6e;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Stream Date Fix · 16/07</h1>
    <p>Adds 16/07 daily entries · Fixes 17/07 label on Jump</p>
  </div>
  <div class="card-body">

    <div class="field">
      <label>Admin key</label>
      <input type="password" id="key-input" placeholder="Enter admin secret…" autocomplete="off">
    </div>

    <div id="preview">
      <h3>Changes to apply</h3>
      <div id="track-list"></div>
    </div>

    <button id="fix-btn" onclick="runFix()">Apply Fixes</button>
    <div id="log"></div>

  </div>
</div>

<script>
// July 16th Spotify totals (from screenshot)
var S16 = { jump: 652801439, ddududu: 878862398, shutdown: 898075850 };
var LABELS = { jump: 'JUMP', ddududu: 'DDU-DU DDU-DU', shutdown: 'Shut Down' };

// What to do per track (populated after loading Redis data)
var ops = []; // { id, label, action:'rename'|'add', streams, from? }

function addLog(type, icon, msg) {
  var el = document.createElement('div');
  el.className = 'log-line ' + type;
  el.innerHTML = '<span class="icon">' + icon + '</span><span>' + msg + '</span>';
  document.getElementById('log').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function loadPreview() {
  document.getElementById('log').innerHTML = '';
  document.getElementById('fix-btn').style.display = 'none';
  document.getElementById('preview').style.display = 'none';
  addLog('info', '<span class="spin"></span>', 'Reading Redis…');

  var data;
  try {
    data = await fetch('/api/streams').then(function(r) { return r.json(); });
  } catch(e) {
    addLog('err', '✕', 'Failed to load: ' + e.message);
    return;
  }

  ops = [];
  var html = '';

  var tracks = ['jump', 'ddududu', 'shutdown'];
  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    var td = data[t] || {};
    var hist = td.history || [];
    var prev = td.prev; // { total, date }

    var has16 = hist.some(function(h) { return h.date === '16/07'; });
    var entry17 = hist.find(function(h) { return h.date === '17/07'; });

    if (has16) {
      // Already correct
      html += row(t, '<span class="action action-none">16/07 already exists</span>', '');
      continue;
    }

    if (entry17) {
      // Wrong date label — rename 17/07 → 16/07
      ops.push({ id: t, label: LABELS[t], action: 'rename', streams: entry17.streams, from: '17/07' });
      html += row(t,
        '<span class="action action-rename">17/07 → 16/07</span>',
        entry17.streams.toLocaleString() + ' streams'
      );
      continue;
    }

    // No 16/07 and no 17/07 — compute from S16 - prev.total
    var daily = 0;
    var note = '';

    if (prev && prev.total && S16[t] > prev.total) {
      daily = S16[t] - prev.total;
      note = S16[t].toLocaleString() + ' − prev(' + prev.date + ')';
    } else {
      // prev is already at S16 (was updated when "15/07" entry was written).
      // The "15/07" history entry = T16 − T15 = the July 16th daily under the
      // correct labelling, just stored with the wrong date label.
      var entry15 = hist.find(function(h) { return h.date === '15/07'; });
      if (entry15) {
        daily = entry15.streams;
        note = 'from 15/07 entry (= T16 − T15)';
      }
    }

    if (daily <= 0) {
      html += row(t, '<span class="action action-none">cannot compute daily</span>', '');
      continue;
    }

    ops.push({ id: t, label: LABELS[t], action: 'add', streams: daily });
    html += row(t,
      '<span class="action action-add">add 16/07</span>',
      daily.toLocaleString() + ' streams · ' + note
    );
  }

  document.getElementById('track-list').innerHTML = html;
  document.getElementById('preview').style.display = 'block';
  document.getElementById('log').innerHTML = '';

  if (ops.length > 0) {
    document.getElementById('fix-btn').style.display = 'block';
  } else {
    addLog('warn', '⚠', 'Nothing to fix — all tracks look correct.');
  }
}

function row(track, badge, detail) {
  return '<div class="track-row">'
    + '<span class="track-name">' + LABELS[track] + '</span>'
    + '<div class="track-detail">'
    + (detail ? '<div class="streams">' + detail + '</div>' : '')
    + badge
    + '</div></div>';
}

async function runFix() {
  var key = document.getElementById('key-input').value.trim();
  if (!key) { addLog('err', '✕', 'Enter the admin key first.'); return; }

  var btn = document.getElementById('fix-btn');
  btn.disabled = true;
  btn.textContent = 'Applying…';
  document.getElementById('log').innerHTML = '';

  var allOk = true;

  for (var i = 0; i < ops.length; i++) {
    var op = ops[i];

    if (op.action === 'rename') {
      // Set 16/07 entry
      addLog('info', '<span class="spin"></span>', op.label + ': setting 16/07 = ' + op.streams.toLocaleString() + '…');
      var r1 = await fetch('/api/streams?action=set-entry&track=' + op.id + '&date=16%2F07&streams=' + op.streams + '&key=' + encodeURIComponent(key)).then(function(r) { return r.json(); });
      if (!r1.ok) { allOk = false; addLog('err', '✕', op.label + ' set-entry failed: ' + JSON.stringify(r1)); continue; }
      addLog('ok', '✓', op.label + ': 16/07 entry set');

      // Delete 17/07 entry
      var r2 = await fetch('/api/streams?action=delete-history-entry&track=' + op.id + '&date=17%2F07&key=' + encodeURIComponent(key)).then(function(r) { return r.json(); });
      if (!r2.ok) { allOk = false; addLog('err', '✕', op.label + ' delete 17/07 failed: ' + JSON.stringify(r2)); }
      else addLog('ok', '✓', op.label + ': 17/07 entry removed');

    } else if (op.action === 'add') {
      addLog('info', '<span class="spin"></span>', op.label + ': adding 16/07 = ' + op.streams.toLocaleString() + '…');
      var r3 = await fetch('/api/streams?action=set-entry&track=' + op.id + '&date=16%2F07&streams=' + op.streams + '&key=' + encodeURIComponent(key)).then(function(r) { return r.json(); });
      if (!r3.ok) { allOk = false; addLog('err', '✕', op.label + ' set-entry failed: ' + JSON.stringify(r3)); }
      else addLog('ok', '✓', op.label + ': 16/07 entry added');
    }
  }

  if (allOk) {
    addLog('ok', '🎉', 'All done! Reload the site to verify.');
    btn.textContent = 'Done ✓';
  } else {
    addLog('err', '✕', 'Some steps failed — see above.');
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}

document.getElementById('key-input').addEventListener('change', loadPreview);
document.getElementById('key-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') loadPreview(); });
</script>
</body>
</html>
