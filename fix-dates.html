<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stream Date Fix · BLINKS Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d0d0d;color:#f0eaf2;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:16px;line-height:1.5;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 64px;
}
.card{
  background:#1a1a1a;border:1px solid #2e2e2e;
  border-radius:14px;width:100%;max-width:440px;overflow:hidden;
}
.card-header{background:#ff1a6e;padding:20px 24px}
.card-header h1{font-size:1.1rem;font-weight:700;letter-spacing:.03em;color:#fff}
.card-header p{font-size:.8rem;color:rgba(255,255,255,.75);margin-top:2px}
.card-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.field label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:6px}
.field input{
  width:100%;background:#0d0d0d;border:1px solid #2e2e2e;
  border-radius:8px;padding:12px 14px;color:#f0eaf2;
  font-size:1rem;font-family:inherit;outline:none;transition:border-color .15s;
}
.field input:focus{border-color:#ff1a6e}
#preview{background:#0d0d0d;border:1px solid #2e2e2e;border-radius:10px;padding:14px;display:none}
#preview h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:10px}
.track-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid #2e2e2e;font-size:.9rem;gap:8px;
}
.track-row:last-child{border-bottom:none}
.track-name{font-weight:600}
.track-meta{color:#888;font-size:.8rem;text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.04em}
.badge-found{background:rgba(255,26,110,.15);color:#ff1a6e}
.badge-missing{background:rgba(136,136,136,.15);color:#888}
#fix-btn{
  width:100%;background:#ff1a6e;color:#fff;border:none;border-radius:10px;
  padding:15px;font-size:1rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:background .15s,opacity .15s;display:none;
}
#fix-btn:hover:not(:disabled){background:#cc1558}
#fix-btn:disabled{opacity:.5;cursor:not-allowed}
#log{display:flex;flex-direction:column;gap:6px}
.log-line{
  display:flex;align-items:flex-start;gap:10px;font-size:.85rem;
  padding:8px 12px;background:#0d0d0d;border-radius:8px;border-left:3px solid transparent;
}
.log-line.info{border-color:#888;color:#888}
.log-line.ok{border-color:#3ecf8e}
.log-line.err{border-color:#ff5a5a;color:#ff5a5a}
.log-line.warn{border-color:#f5c518;color:#f5c518}
.icon{flex-shrink:0;width:16px;text-align:center}
.spin{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.2);border-top-color:#ff1a6e;
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Stream Date Fix</h1>
    <p>Moves 17/07 entries → 16/07 for Jump, DDU-DU &amp; Shut Down</p>
  </div>
  <div class="card-body">

    <div class="field">
      <label>Admin key</label>
      <input type="password" id="key-input" placeholder="Enter admin secret…" autocomplete="off">
    </div>

    <div id="preview">
      <h3>17/07 entries in Redis</h3>
      <div id="track-list"></div>
    </div>

    <button id="fix-btn" onclick="runFix()">Fix Dates Now</button>

    <div id="log"></div>

  </div>
</div>

<script>
var TRACKS = ['jump','ddududu','shutdown'];
var LABELS = {jump:'JUMP',ddududu:'DDU-DU DDU-DU',shutdown:'Shut Down'};
var found  = {};

function addLog(type, icon, msg) {
  var el = document.createElement('div');
  el.className = 'log-line ' + type;
  el.innerHTML = '<span class="icon">' + icon + '</span><span>' + msg + '</span>';
  document.getElementById('log').appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function loadPreview() {
  document.getElementById('log').innerHTML = '';
  addLog('info','<span class="spin"></span>','Reading Redis…');
  try {
    var data = await fetch('/api/streams').then(function(r){return r.json();});
    found = {};
    var html = '';
    var anyFound = false;
    for (var i = 0; i < TRACKS.length; i++) {
      var t = TRACKS[i];
      var hist = (data[t] && data[t].history) ? data[t].history : [];
      var entry = hist.find(function(h){return h.date==='17/07';});
      if (entry) {
        found[t] = entry.streams;
        anyFound = true;
        html += '<div class="track-row">'
          + '<span class="track-name">' + LABELS[t] + '</span>'
          + '<div><div class="track-meta">' + entry.streams.toLocaleString() + ' streams/day</div>'
          + '<span class="badge badge-found">17/07 → 16/07</span></div></div>';
      } else {
        html += '<div class="track-row">'
          + '<span class="track-name">' + LABELS[t] + '</span>'
          + '<span class="badge badge-missing">no 17/07 entry</span></div>';
      }
    }
    document.getElementById('track-list').innerHTML = html;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('log').innerHTML = '';
    if (anyFound) {
      document.getElementById('fix-btn').style.display = 'block';
    } else {
      addLog('warn','⚠','No 17/07 entries found — nothing to fix.');
    }
  } catch(e) {
    addLog('err','✕','Failed to load: ' + e.message);
  }
}

async function runFix() {
  var key = document.getElementById('key-input').value.trim();
  if (!key) { addLog('err','✕','Enter the admin key first.'); return; }
  var btn = document.getElementById('fix-btn');
  btn.disabled = true;
  btn.textContent = 'Fixing…';
  document.getElementById('log').innerHTML = '';
  var allOk = true;
  for (var i = 0; i < TRACKS.length; i++) {
    var t = TRACKS[i];
    if (!found[t]) { addLog('info','—', LABELS[t] + ': no 17/07 entry, skipped'); continue; }
    addLog('info','<span class="spin"></span>', LABELS[t] + ': setting 16/07 = ' + found[t].toLocaleString() + '…');
    var r1 = await fetch('/api/streams?action=set-entry&track=' + t + '&date=16%2F07&streams=' + found[t] + '&key=' + encodeURIComponent(key)).then(function(r){return r.json();});
    if (!r1.ok) {
      allOk = false;
      addLog('err','✕', LABELS[t] + ' set-entry failed: ' + JSON.stringify(r1));
      continue;
    }
    addLog('ok','✓', LABELS[t] + ': 16/07 entry created');
    var r2 = await fetch('/api/streams?action=delete-history-entry&track=' + t + '&date=17%2F07&key=' + encodeURIComponent(key)).then(function(r){return r.json();});
    if (!r2.ok) {
      allOk = false;
      addLog('err','✕', LABELS[t] + ' delete 17/07 failed: ' + JSON.stringify(r2));
    } else {
      addLog('ok','✓', LABELS[t] + ': 17/07 entry removed');
    }
  }
  if (allOk) {
    addLog('ok','🎉','All done! You can close this page.');
    btn.textContent = 'Done ✓';
  } else {
    addLog('err','✕','Some steps failed — see errors above.');
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}

document.getElementById('key-input').addEventListener('change', loadPreview);
document.getElementById('key-input').addEventListener('keydown', function(e){ if(e.key==='Enter') loadPreview(); });
</script>
</body>
</html>
