name: Refresh scrobbles

on:
  schedule:
    # :55 instead of :00 — Italy's UTC offset is always a whole number of hours,
    # so this lands 5 minutes before every hour boundary, including whichever
    # one is that day's 2am-Italy reset. Avoids losing up to ~59 minutes of
    # streams right before reset that no later run would ever look back for.
    - cron: '55 * * * *'   # every hour, 5 min before the top of the hour
  workflow_dispatch:          # also runnable manually from GitHub Actions tab
    inputs:
      checkArchive:
        description: 'Read-only check: print the archive table contents'
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/cron-scrobbles"
      - name: Force archive write (debug only)
        if: ${{ inputs.checkArchive }}
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/cron-scrobbles?debugArchive=1"
      - name: Check archive (debug only)
        if: ${{ inputs.checkArchive }}
        run: |
          echo "--- daily ---"
          curl -s "https://blackpink-project.vercel.app/api/leaderboard-archive?period=daily"
          echo
          echo "--- weekly ---"
          curl -s "https://blackpink-project.vercel.app/api/leaderboard-archive?period=weekly"
