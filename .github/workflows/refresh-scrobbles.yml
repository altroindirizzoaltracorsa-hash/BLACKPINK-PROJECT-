name: Refresh scrobbles

on:
  schedule:
    # :55 instead of :00 — Italy's UTC offset is always a whole number of hours,
    # so this lands 5 minutes before every hour boundary, including whichever
    # one is that day's 2am-Italy reset. Avoids losing up to ~59 minutes of
    # streams right before reset that no later run would ever look back for.
    - cron: '55 * * * *'   # every hour, 5 min before the top of the hour
  workflow_dispatch:          # also runnable manually from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          set -e
          # --location-trusted: VERCEL_URL may point at an old domain that now
          # 307-redirects to the current one (e.g. after a custom-domain
          # migration) — without following, curl "succeeds" on the redirect
          # stub and never reaches the real endpoint. Safe to keep the
          # Authorization header across the redirect here since both ends are
          # our own infrastructure.
          http_code=$(curl -s -L --location-trusted -o response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/cron-scrobbles")
          echo "HTTP $http_code"
          echo "--- response body ---"
          cat response.json
          echo ""
          echo "--- summary ---"
          jq -r '"refreshed: \(.refreshed | length) · failed: \(.failed | length) · unverified (skipped): \(.unverified | length) · merged duplicates: \(.merged | length)"' response.json || true
          jq -r '.failed[]? | "  FAILED: \(.username) — \(.error)"' response.json || true
          jq -r '.merged[]? | "  MERGED (dropped stale duplicate): \(.)"' response.json || true
          if [ "$http_code" -ge 400 ]; then exit 1; fi
