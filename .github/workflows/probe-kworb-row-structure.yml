name: Probe kworb row structure

# One-off, manual-only: dumps raw table structure from kworb.net to design an
# accurate parser for the Charts feature.
# Safe to remove once the Charts feature is built.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe kworb row structure
        run: node .github/scripts/probe-kworb-row-structure.mjs
