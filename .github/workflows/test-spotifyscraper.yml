name: Test spotifyscraper catalog fetch

on:
  workflow_dispatch:   # manual trigger only -- experimental, not on any schedule

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spotifyscraper
        run: pip install spotifyscraper

      - name: Run test fetch
        run: python .github/scripts/test-spotifyscraper.py
