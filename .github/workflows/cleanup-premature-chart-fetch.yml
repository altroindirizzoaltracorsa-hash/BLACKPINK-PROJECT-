name: Cleanup premature chart fetch

# One-off: deletes chart_positions rows mistakenly dated today from a
# manual fetch run before Spotify's ~22:00 UTC publish window. Safe to
# remove once run.
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'tracking_date (YYYY-MM-DD) to delete'
        required: true
        default: '2026-07-23'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Delete rows for the given date
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/cleanup_premature_chart_fetch.mjs "${{ github.event.inputs.date }}"
