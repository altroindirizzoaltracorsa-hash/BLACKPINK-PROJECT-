name: BLACKPINK Spotify Catalog

on:
  schedule:
    # 10 PM UTC daily — Spotify usually updates earlier in the evening
    - cron: '0 22 * * *'
  workflow_dispatch:   # also allows manual trigger from the GitHub Actions tab
    inputs:
      base_url:
        description: 'Base URL to test against (leave blank for production). Use a Vercel preview URL to validate api/streams.js changes before they reach main.'
        required: false
        default: ''
      run_artist_fetch:
        description: 'Run fetch-artist-streams. Set to false when manually triggering for an unrelated job (e.g. a one-off backfill) outside Spotify''s usual update window (midday-evening Rome time), to avoid writing a premature/duplicate day.'
        required: false
        default: 'true'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force-refresh BLACKPINK catalog total on Vercel
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          VERCEL_URL: ${{ inputs.base_url != '' && inputs.base_url || 'https://blackpink-project.vercel.app' }}
        run: node .github/scripts/fetch-catalog.mjs

  # Experimental, manual-only: test whether spotifyscraper's embed-page-bootstrapped
  # anon token survives GitHub Actions' network, unlike open.spotify.com/get_access_token
  # which is blocked here. Prints diagnostics only, does not touch production data.
  test-spotifyscraper:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spotifyscraper
        run: pip install spotifyscraper

      - name: Run test fetch
        run: python .github/scripts/test-spotifyscraper.py

  # Manual-only for now, until fetch-artist-streams.yml exists on main and
  # can run on its own daily schedule -- same registration limitation as
  # test-spotifyscraper above.
  fetch-artist-streams:
    if: github.event_name == 'workflow_dispatch' && inputs.run_artist_fetch != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spotifyscraper
        run: pip install spotifyscraper

      - name: Fetch and store artist streams
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/scripts/fetch_artist_streams.py

  # One-time, manual-only: a workflow_dispatch run at 02:51 UTC on 07-20
  # re-triggered fetch-artist-streams right after the calendar rolled
  # over, before Spotify had actually updated its public counts, so it
  # wrote a bogus 07-19 row (verbatim copy of 07-18, delta=0) for every
  # artist. Deletes those rows. Safe to remove once it's been run.
  cleanup-premature-0719:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install httpx
        run: pip install httpx

      - name: Delete the premature 07-19 rows
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/scripts/cleanup_premature_0719.py
