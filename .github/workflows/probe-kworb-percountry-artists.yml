name: Probe kworb per-country artist pages

# One-off, manual-only: checks whether kworb.net has undocumented per-country
# artist chart pages before falling back to a different source.
# Safe to remove once the feature (if built) ships.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe kworb per-country artist pages
        run: node .github/scripts/probe-kworb-percountry-artists.mjs
