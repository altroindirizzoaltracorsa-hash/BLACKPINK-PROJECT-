name: Probe Shazam public endpoints

# One-off diagnostic: checks whether Shazam's public web endpoints (locations/
# charts/search/listening-counter) are reachable from GitHub Actions before
# building a real fetch script around them. Safe to remove once confirmed.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node .github/scripts/probe-shazam.mjs
