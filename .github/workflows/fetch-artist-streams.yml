name: Artist Streams Tracker

on:
  schedule:
    # 22:30 UTC daily -- 30 min after the BLACKPINK catalog cron, well
    # inside Spotify's usual evening update window.
    - cron: '30 22 * * *'
  workflow_dispatch:   # manual trigger from the GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spotifyscraper
        run: pip install spotifyscraper

      - name: Fetch and store artist streams
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/scripts/fetch_artist_streams.py
