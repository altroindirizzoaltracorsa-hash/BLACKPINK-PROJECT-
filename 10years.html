<title>10 Years of BLACKPINK — August 8, 2026</title>
<style>
  :root {
    --bg:       #0A0608;
    --bg-card:  #160A10;
    --pink:     #FF2D6B;
    --pink-dim: rgba(255,45,107,0.10);
    --pink-border: rgba(255,45,107,0.22);
    --gold-bg:  rgba(245,200,66,0.11);
    --text:     #F0DCE4;
    --muted:    #7A5A68;
    --faint:    #38202C;
    --green:    #1ED760;
    --green-dim: rgba(30,215,96,0.09);
    --green-border: rgba(30,215,96,0.28);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    overflow-x: hidden;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
  }

  /* ── ENTRANCE ANIMATION ───────────────────────────── */
  @keyframes rise {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim {
    opacity: 0;
    animation: rise 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── YOUTUBE SECTION ──────────────────────────────── */
  .yt-section {
    padding: 1.75rem clamp(1rem, 5vw, 3rem) 1rem;
    max-width: 1040px;
    margin: 0 auto;
  }

  .yt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  .yt-wrap {
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--faint);
    background: var(--bg-card);
    transition: border-color 0.2s;
  }
  .yt-wrap:hover { border-color: var(--pink-border); }

  .yt-iframe-box {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
  }
  .yt-iframe-box iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .yt-label {
    padding: 0.65rem 0.9rem 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .yt-label-tag {
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .yt-label-name {
    font-family: 'Arial Black', Arial, Impact, sans-serif;
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  /* ── BLACKPINK LOGO ───────────────────────────────── */
  .bp-logo {
    width: clamp(220px, 70vw, 420px);
    height: auto;
    display: block;
  }

  /* ── HERO / COUNTDOWN ─────────────────────────────── */
  .hero {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem 3rem;
    text-align: center;
    overflow: hidden;
  }

  .bg-ten {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-ten-num {
    font-family: 'Arial Black', Arial, Impact, sans-serif;
    font-size: clamp(260px, 62vw, 860px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.06em;
    color: var(--gold-bg);
    user-select: none;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 20%, var(--bg) 80%);
    z-index: 1;
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
  }

  .eyebrow {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--pink);
    text-transform: uppercase;
  }

  .hero-title {
    font-family: 'Arial Black', Arial, Impact, sans-serif;
    font-size: clamp(2.2rem, 8.5vw, 6rem);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.025em;
    color: var(--text);
    text-wrap: balance;
  }
  .hero-title .accent { color: var(--pink); }

  .hero-rule {
    width: 38px;
    height: 2px;
    background: var(--pink);
    border-radius: 1px;
    opacity: 0.55;
    margin: 0.1rem 0;
  }

  .hero-sub {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── COUNTDOWN ────────────────────────────────────── */
  .countdown {
    display: flex;
    align-items: flex-start;
    gap: clamp(0.3rem, 1.5vw, 1.1rem);
    margin-top: 0.3rem;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .cd-num {
    font-family: 'Arial Black', Arial, Impact, sans-serif;
    font-size: clamp(3rem, 10.5vw, 7rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    min-width: 2.1ch;
    text-align: center;
  }

  .cd-label {
    font-size: 0.52rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .cd-sep {
    font-family: 'Arial Black', Arial, Impact, sans-serif;
    font-size: clamp(2rem, 7vw, 5rem);
    font-weight: 900;
    line-height: 1;
    color: var(--pink);
    opacity: 0.55;
    padding-top: 0.15em;
  }

  @keyframes blink { 0%,49%{opacity:0.55} 50%,100%{opacity:0.15} }
  .cd-sep { animation: blink 1s step-end infinite; }

  .hero-glow {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--pink) 50%, transparent 100%);
    opacity: 0.45;
    z-index: 2;
  }

  /* ── SPOTIFY SECTION ──────────────────────────────── */
  .sp-section {
    padding: 1rem clamp(1rem, 5vw, 3rem) 2.5rem;
    max-width: 1040px;
    margin: 0 auto;
  }

  .sp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  .sp-wrap {
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--faint);
    background: var(--bg-card);
    transition: border-color 0.2s;
  }
  .sp-wrap:hover { border-color: var(--green-border); }

  .sp-label {
    padding: 0.65rem 0.9rem 0.55rem;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .sp-label-tag {
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .sp-label-name {
    font-family: 'Arial Black', Arial, Impact, sans-serif;
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .sp-iframe-box iframe {
    display: block;
    width: 100%;
    border: none;
    height: 80px;
  }

  /* ── FOOTER ───────────────────────────────────────── */
  .page-footer {
    border-top: 1px solid var(--faint);
    padding: 2rem;
    text-align: center;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--faint);
    text-transform: uppercase;
  }
  .page-footer a {
    color: var(--pink);
    text-decoration: none;
    opacity: 0.6;
  }
  .page-footer a:hover { opacity: 1; }
</style>

<script>
  const TARGET = new Date('2026-08-08T00:00:00+09:00').getTime();
  function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }
  function tick() {
    const diff = TARGET - Date.now();
    if (diff <= 0) {
      ['d','h','m','s'].forEach(id => document.getElementById('cd-'+id).textContent = '00');
      return;
    }
    document.getElementById('cd-d').textContent = pad(Math.floor(diff / 86400000));
    document.getElementById('cd-h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('cd-m').textContent = pad(Math.floor((diff % 3600000)  / 60000));
    document.getElementById('cd-s').textContent = pad(Math.floor((diff % 60000)    / 1000));
  }
  tick();
  setInterval(tick, 1000);
</script>
